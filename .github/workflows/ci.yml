name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable, with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Tests (pytest)
        run: |
          set +e
          # tests/ is authored separately by the maintainer and tests/fixtures/ is
          # gitignored, so a fresh checkout can have no tests/ directory at all.
          # Treat a missing dir (pytest exit 4) or "no tests collected" (exit 5)
          # as a scaffold pass until real tests land.
          if [ ! -d tests ]; then echo "No tests/ directory yet — passing scaffold."; exit 0; fi
          pytest -q tests/
          code=$?
          if [ "$code" -eq 5 ]; then echo "No tests collected yet — passing scaffold."; exit 0; fi
          exit $code
