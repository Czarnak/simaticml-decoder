name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable, with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Tests (pytest)
        run: |
          set +e
          pytest -q tests/
          code=$?
          # exit code 5 = "no tests collected". The scaffold ships without tests
          # (authored separately); treat that as a pass until tests are added.
          if [ "$code" -eq 5 ]; then echo "No tests collected yet — passing scaffold."; exit 0; fi
          exit $code
